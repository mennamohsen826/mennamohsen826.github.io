<main>
<h2>Add a New Course</h2>
<section>
    <fieldset>
    <form>
        <div>
        <label for="txt" required >Course Name:</label>
<input id="txt" type="text"  >
</div>

<div>
<label  for="in" >Instructor:</label>
<input id="in" type="text"  >
</div>

<div>
<label for="num">Credit Hours:</label>
<input id="num" type="number">
</div>
<div>
    <label for="note">Notes:</label>
<textarea  id="note"  placeholder="Add any notes about this course such as important topics ,exam details... e.g" >


</textarea>


</div>


<input type="submit" value="Add Course">




    </form>
    </fieldset>

</section>
